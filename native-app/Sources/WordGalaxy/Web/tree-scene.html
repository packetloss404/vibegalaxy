<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overscroll-behavior: none; height: 100%; }
    canvas { display: block; touch-action: none; }

    #popup {
        display: none;
        position: fixed;
        background: rgba(8, 8, 18, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 18px 22px;
        color: white;
        min-width: 200px;
        max-width: 280px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        z-index: 100;
        animation: popIn 0.15s ease-out;
    }
    @keyframes popIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    #popup .close-btn {
        position: absolute; top: 10px; right: 14px;
        cursor: pointer; opacity: 0.4; font-size: 18px;
        line-height: 1; transition: opacity 0.15s;
    }
    #popup .close-btn:hover { opacity: 1; }
    #popup .word-title {
        font-size: 24px; font-weight: 700;
        font-family: 'SF Mono', 'Menlo', monospace;
        color: #66cc44; margin-bottom: 14px;
    }
    #popup .stat-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    #popup .stat-row:last-child { border-bottom: none; }
    #popup .stat-label {
        font-size: 11px; color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase; letter-spacing: 0.5px;
    }
    #popup .stat-value {
        font-size: 14px; font-weight: 600;
        font-family: 'SF Mono', 'Menlo', monospace;
    }
    #popup .stat-value.count { color: #fbbd23; }
    #popup .stat-value.rank { color: #66cc44; }
    #popup .stat-value.date { color: #88aacc; }

    #village-hud {
        position: fixed;
        top: 16px;
        right: 16px;
        text-align: right;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s;
    }
    #village-pop {
        font-size: 36px;
        font-weight: 700;
        font-family: 'SF Mono', 'Menlo', monospace;
        color: #fff;
        text-shadow: 0 0 10px rgba(255, 200, 100, 0.4);
    }
    #village-pop-label {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    #death-notification {
        display: none;
        position: fixed;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 200;
        pointer-events: none;
        font-size: 22px;
        font-weight: 700;
        font-family: 'SF Mono', 'Menlo', monospace;
        color: #ff4444;
        text-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 0 40px rgba(255, 0, 0, 0.3);
        letter-spacing: 2px;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    #cinematic-skip-hint {
        display: none;
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 200;
        pointer-events: none;
        font-size: 12px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 2px;
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
    }

    #rain-counter {
        display: none;
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 50;
        pointer-events: none;
    }
    #counter-number {
        font-size: 72px;
        font-weight: 800;
        font-family: 'SF Mono', 'Menlo', monospace;
        color: #fff;
        text-shadow: 0 0 20px rgba(60, 140, 255, 0.6), 0 0 50px rgba(60, 140, 255, 0.3);
        letter-spacing: 2px;
        line-height: 1;
    }
    #counter-label {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-top: 6px;
    }
</style>
</head>
<body>

<div id="popup">
    <span class="close-btn" onclick="hidePopup()">&times;</span>
    <div class="word-title" id="popup-word"></div>
    <div class="stat-row">
        <span class="stat-label">Times used</span>
        <span class="stat-value count" id="popup-count"></span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Frequency rank</span>
        <span class="stat-value rank" id="popup-rank"></span>
    </div>
    <div class="stat-row">
        <span class="stat-label">First seen</span>
        <span class="stat-value date" id="popup-date"></span>
    </div>
</div>

<div id="village-hud">
    <div id="village-pop">0</div>
    <div id="village-pop-label">villagers</div>
</div>

<div id="death-notification"></div>
<div id="cinematic-skip-hint">Click to skip</div>

<div id="rain-counter">
    <div id="counter-number">0</div>
    <div id="counter-label">words transcribed</div>
</div>

<div id="flash-overlay" style="position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:100;"></div>
<div id="vignette-overlay" style="position:fixed;inset:0;background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);opacity:0;pointer-events:none;z-index:99;"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
}
</script>
<script>
// Prevent WKWebView from intercepting scroll/wheel events — let Three.js OrbitControls handle them
// Use capture phase to intercept before any other handler
document.addEventListener('wheel', function(e) { e.preventDefault(); }, { passive: false, capture: true });
document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { capture: true });
document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { capture: true });
</script>
<script type="module" src="main.js"></script>
</body>
</html>
